name: Deploy ZL-HTML Data

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因（可选）'
        required: false
        default: ''

jobs:
  deploy-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Install wrangler
        run: npm install -g wrangler
      
      - name: Generate zl-html data
        run: |
          echo "🔨 从 resource/html/ 生成 zl-html 数据..."
          python process_html_books.py
          echo "✓ zl-html 数据生成完成"
          echo "📋 生成结果:"
          ls -la resource/zl-html/ || echo "⚠️ resource/zl-html/ 目录不存在"
      
      - name: Deploy zl-html data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 部署 zl-html 数据到 Cloudflare Pages..."
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
            if [ $RETRY_COUNT -gt 0 ]; then
              echo "⏳ 等待 30 秒后重试..."
              sleep 30
              echo "🔄 重试第 $RETRY_COUNT 次..."
            fi
            
            if wrangler pages deploy resource/zl-html \
              --project-name=books-data \
              --commit-dirty=true; then
              SUCCESS=true
              echo "✓ zl-html 数据部署成功"
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 部署失败，准备重试 ($RETRY_COUNT/$MAX_RETRIES)"
              else
                echo "⚠️ 部署失败，尝试创建项目..."
                wrangler pages project create books-data --production-branch=main || true
                if wrangler pages deploy resource/zl-html \
                  --project-name=books-data \
                  --commit-dirty=true; then
                  SUCCESS=true
                  echo "✓ zl-html 数据部署成功（项目创建后）"
                else
                  echo "❌ zl-html 数据部署失败"
                  exit 1
                fi
              fi
            fi
          done
