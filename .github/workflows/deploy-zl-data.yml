name: Deploy books-data to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'resource/ysz/**'
      - 'process_ysz_books.py'
      - 'merge_zl_data.py'
      - '.github/workflows/deploy-zl-data.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Regenerate & deploy zl-merged to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g wrangler

      - name: Regenerate zl-merged from ysz
        run: |
          echo "=== Step 1: ysz -> zl-ysz ==="
          python process_ysz_books.py
          echo "=== Step 2: zl-ysz -> zl-merged ==="
          python merge_zl_data.py --force
          echo "=== Done ==="
          ls -la resource/zl-merged/
          cat resource/zl-merged/manifest.json

      - name: Prepare deployment with zl-data prefix
        run: |
          echo "=== 创建 zl-data/ 子目录结构 ==="
          mkdir -p deploy-staging/zl-data
          cp -r resource/zl-merged/* deploy-staging/zl-data/
          # _headers 放在根目录，/* 通配符覆盖所有路径（含 /zl-data/）
          if [ -f resource/zl-merged/_headers ]; then
            cp resource/zl-merged/_headers deploy-staging/
          fi
          echo "✓ 部署目录结构："
          ls -la deploy-staging/
          echo "  zl-data/ 内容："
          ls deploy-staging/zl-data/ | head -20

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy deploy-staging --project-name=books-data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
